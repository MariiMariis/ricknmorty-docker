name: Deploy

on:
  push:
    branches: [dev, master]

jobs:
  deploy-dev:
    name: Deploy Dev
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build
        working-directory: api
        run: mvn package -DskipTests

      - name: Simular deploy em dev
        run: |
          echo "Deploying to DEV environment"
          echo "APP_MODE: ${{ vars.APP_MODE }}"
          echo "Build concluido com sucesso para DEV"

  deploy-prod:
    name: Deploy Prod
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build
        working-directory: api
        run: mvn package -DskipTests

      - name: Simular deploy em prod
        run: |
          echo "Deploying to PROD environment"
          echo "Deploy concluido com sucesso para PROD"
        env:
          PROD_TOKEN: ${{ secrets.PROD_TOKEN }}
