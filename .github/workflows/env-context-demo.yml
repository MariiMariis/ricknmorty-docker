name: Env Context Demo

on:
  workflow_dispatch:

env:
  STAGE: test
  APP_NAME: ricknmorty-api

jobs:
  env-demo:
    name: Demonstrar Contextos e Escopos
    runs-on: ubuntu-latest
    env:
      JOB_ENV: valor-do-job
    steps:
      - name: Contexto GitHub
        run: |
          echo "Actor: ${{ github.actor }}"
          echo "Repositorio: ${{ github.repository }}"
          echo "Evento: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"

      - name: Contexto Runner
        run: |
          echo "Sistema Operacional: ${{ runner.os }}"
          echo "Arquitetura: ${{ runner.arch }}"
          echo "Workspace: ${{ runner.workspace }}"

      - name: Variaveis de nivel workflow
        run: |
          echo "STAGE: $STAGE"
          echo "APP_NAME: $APP_NAME"

      - name: Variaveis de nivel job
        run: echo "JOB_ENV: $JOB_ENV"

      - name: Variaveis de nivel step
        env:
          STEP_ENV: valor-do-step
          STAGE: producao
        run: |
          echo "STEP_ENV: $STEP_ENV"
          echo "STAGE (sobrescrito no step): $STAGE"

      - name: Verificar sobreposicao de escopo
        run: echo "STAGE (volta ao valor do workflow): $STAGE"
