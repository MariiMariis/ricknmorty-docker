name: Lint and Test

on:
  workflow_call:
    inputs:
      run_tests:
        description: 'Executar testes'
        required: false
        type: boolean
        default: true
      run_lint:
        description: 'Executar linting'
        required: false
        type: boolean
        default: true

jobs:
  lint:
    name: Checkstyle Lint
    runs-on: ubuntu-latest
    if: ${{ inputs.run_lint }}
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Executar Checkstyle
        run: mvn checkstyle:check

  test:
    name: Testes
    runs-on: ubuntu-latest
    if: ${{ inputs.run_tests }}
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar e Testar
        run: mvn verify -DskipTests=false
