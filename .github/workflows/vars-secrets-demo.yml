name: Variáveis e Secrets

on:
  workflow_dispatch:

jobs:
  demo-vars:
    name: Demonstrar Variáveis e Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Exibir variáveis do repositório
        run: |
          echo "APP_MODE: ${{ vars.APP_MODE }}"
          echo "SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}"

      - name: Simular autenticação com secret
        run: |
          if [ -z "$PROD_TOKEN" ]; then
            echo "ERRO: PROD_TOKEN não configurado"
            exit 1
          fi
          echo "Autenticação simulada com sucesso (token presente)"
        env:
          PROD_TOKEN: ${{ secrets.PROD_TOKEN }}
